<!doctype html>
<html lang="pt-br">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="text-scale" content="scale" />
	<meta name="theme-color" content="#0ea5e9" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="default" />
	<meta name="apple-mobile-web-app-title" content="Koda" />
	<link rel="manifest" href="/manifest.json" />
	<link rel="apple-touch-icon" href="/logo.png" />
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:z-[200] focus:px-4 focus:py-2 focus:bg-sky-500 focus:text-white focus:rounded-lg focus:top-4 focus:left-4">
		Pular para o conteúdo
	</a>
	<div style="display: contents">%sveltekit.body%</div>
	<script>
		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.register('/service-worker.js');
		}
	</script>
</body>

</html>
